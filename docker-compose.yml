version: "3.8"

services:
  # Your existing Next.js app
  frontend:
    container_name: next-admin
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"  # Changed to expose only internally
    env_file:
      - .env
    restart: always
    networks:
      - app-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - frontend
    restart: always
    networks:
      - app-network

  # Certbot for SSL certificates (Let's Encrypt)
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl-challenge:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --email your-email@example.com --agree-tos --no-eff-email -d your-domain.com
    depends_on:
      - nginx

networks:
  app-network:
    driver: bridge

volumes:
  ssl-data: