version: "3.8"

services:
  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot/ssl:/etc/letsencrypt
      - certbot/ssl-challenge:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot  --non-interactive --agree-tos -d gambiaclass.org -d www.gambiaclass.org

  # Next.js frontend
  frontend:
    container_name: class-admin
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
    networks:
      - class-software-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-proxy/nginx.conf:/etc/nginx/nginx.conf
      - nginx-proxy/ssl:/etc/nginx/ssl
      - nginx-proxy/ssl-challenge:/var/www/certbot
      - nginx-proxy/log:/var/log/nginx
    depends_on:
      - class-admin
    restart: always
    networks:
      - class-software-network
      - bridge
