version: "3.8"

services:
  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl-challenge:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot  --non-interactive --agree-tos -d gambiaclass.org -d www.gambiaclass.org

  # Next.js frontend
  frontend:
    container_name: next-admin
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
    networks:
      - class-software-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./ssl-challenge:/var/www/certbot
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - frontend
    restart: always
    networks:
      - class-software-network

networks:
  class-software-network:
    external: true

volumes:
  ssl-data:
