events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name gambiaclass.org www.gambiaclass.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        return 301 https://$host$request_uri;
        
        # location / {
        #     proxy_pass http://frontend:3000;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }

server {
    listen 443 ssl;
    server_name gambiaclass.org www.gambiaclass.org;

        ssl_certificate "/etc/nginx/ssl/live/gambiaclass.org/fullchain.pem";
        ssl_certificate_key "/etc/nginx/ssl/live/gambiaclass.org/privkey.pem";
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout  10m;
        #ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #  location /api {
    #     proxy_pass http://class-backend:5500;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}


server {
    listen 5500 ssl;
    server_name gambiaclass.org www.gambiaclass.org;

        ssl_certificate "/etc/nginx/ssl/live/gambiaclass.org/fullchain.pem";
        ssl_certificate_key "/etc/nginx/ssl/live/gambiaclass.org/privkey.pem";
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout  10m;
        #ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://class-backend:5500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

}

