events {
    worker_connections 1024;
}

http {
    # HTTP Server - Redirect to HTTPS
    server {
        listen 80;
        server_name gambiaclass.org www.gambiaclass.org;

        # Let's Encrypt verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name gambiaclass.org www.gambiaclass.org;

        # SSL certificates
        ssl_certificate /etc/nginx/ssl/live/gambiaclass.org/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/gambiaclass.org/privkey.pem;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Forward everything to your Next.js app
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}